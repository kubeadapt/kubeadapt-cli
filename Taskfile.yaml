version: '3'

tasks:
  download:
    desc: Download Go module dependencies
    cmds:
      - go mod download

  build:
    desc: Build binary for the current platform (fast local dev via GoReleaser snapshot)
    cmds:
      - goreleaser build --snapshot --single-target --clean
      - mkdir -p bin
      - cp dist/kubeadapt-cli_*/* bin/kubeadapt-cli

  build-all:
    desc: Build binaries for all supported platforms (linux, darwin, windows - amd64, arm64)
    cmds:
      - goreleaser build --snapshot --clean

  test:
    desc: Run tests with race detector and coverage
    cmds:
      - go test -race -cover ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .
      - goimports -w .

  release-local:
    desc: Create a full local release snapshot with all artifacts (no publish)
    cmds:
      - goreleaser release --snapshot --clean

  release-dry-run:
    desc: Dry-run the full release pipeline without publishing to GitHub
    cmds:
      - goreleaser release --snapshot --skip=publish --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ bin/

  install:
    desc: Install binary to GOPATH/bin
    cmds:
      - go install ./...

  vuln:
    desc: Run govulncheck to detect known vulnerabilities
    cmds:
      - govulncheck ./...
