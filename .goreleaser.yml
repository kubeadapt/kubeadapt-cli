version: 2

project_name: replace-me

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: ./main.go
    binary: replace-me
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kubeadapt/replace-me/internal/version.Version={{.Version}}
      - -X github.com/kubeadapt/replace-me/internal/version.Commit={{.Commit}}
      - -X github.com/kubeadapt/replace-me/internal/version.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto

# ──────────────────────────────────────────────────────────────────────────────
# HOMEBREW DISTRIBUTION
# Enables: brew install kubeadapt/tap/replace-me
#
# Prerequisite: create github.com/kubeadapt/homebrew-tap (public repo)
# If you don't need Homebrew distribution, delete this entire section.
# ──────────────────────────────────────────────────────────────────────────────
brews:
  - name: replace-me
    repository:
      owner: kubeadapt
      name: homebrew-tap
    commit_author:
      name: platform-assistant[bot]
      email: platform-assistant[bot]@users.noreply.github.com
    commit_msg_template: "chore(deps): update formula for {{ .ProjectName }} {{ .Tag }}"
    homepage: "https://kubeadapt.io"
    description: "Replace with your CLI description"
    license: "Apache-2.0"
    install: |
      bin.install "replace-me"
    test: |
      system "#{bin}/replace-me", "version"

# ──────────────────────────────────────────────────────────────────────────────
# KREW DISTRIBUTION (kubectl plugin manager)
# Enables: kubectl krew install replace-me  →  kubectl replace-me
#
# Prerequisites:
#   1. Create github.com/kubeadapt/krew-index (public repo)
#   2. For official distribution: open PR to kubernetes-sigs/krew-index
#
# Binary naming: GoReleaser will also produce a kubectl-replace-me binary
# that kubectl plugin discovery picks up automatically from PATH.
#
# If this CLI is NOT a kubectl plugin, delete this entire section.
# ──────────────────────────────────────────────────────────────────────────────
